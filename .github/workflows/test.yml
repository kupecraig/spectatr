name: Tests

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and type-check runs first — fast gate before tests spend time running
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Prisma client is not committed — must be generated from schema before tsc
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/spectatr

      # shared-types dist/ must exist before server/ui can resolve @spectatr/shared-types
      - name: Build shared-types
        run: npm run build:shared

      - name: Type-check server
        run: npx tsc --noEmit
        working-directory: packages/server

      # UI tsconfig.app.json already has noEmit: true; also runs full vite build to
      # catch any bundler-level errors that tsc alone won't surface
      - name: Type-check UI
        run: npx tsc --project tsconfig.app.json --noEmit
        working-directory: packages/ui

      - name: Build UI
        run: npm run build
        working-directory: packages/ui
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          VITE_TENANT_ID: trc-2025

  # Unit tests run after build passes
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/spectatr

      - name: Build shared-types
        run: npm run build:shared

      # vitest (watch mode) would hang in CI — test:unit uses `vitest run`
      - name: Test shared-types
        run: npm run test:unit
        working-directory: packages/shared-types

      # test:coverage runs the unit project with coverage — subsumes test:unit
      # Env vars are needed because myTeamStore calls getActiveTenantId() at module load
      - name: Test UI (unit + coverage)
        run: npm run test:coverage
        working-directory: packages/ui
        env:
          VITE_TENANT_ID: trc-2025
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/ui/coverage/coverage-final.json
          flags: unittests
          name: unit-tests
        continue-on-error: true  # don't fail build if Codecov token not configured

  # Storybook interaction tests run after unit tests pass
  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/spectatr

      - name: Build shared-types
        run: npm run build:shared

      # Storybook build (via test-storybook:ci) runs Vite which needs env vars
      - name: Write UI env file
        run: |
          mkdir -p packages/ui/env
          printf 'VITE_CLERK_PUBLISHABLE_KEY=pk_test_placeholder\nVITE_TENANT_ID=trc-2025\n' > packages/ui/env/.env

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: packages/ui

      - name: Run Storybook tests
        run: npm run test-storybook:ci
        working-directory: packages/ui

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-test-results
          path: packages/ui/playwright-report
